#TODO LIST PROJECT
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #4facfe;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 18px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        ul {
            margin-top: 20px;
        }

        li {
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-top: 10px;
            background: #f4f4f4;
            border-radius: 5px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
        }

        .delete:hover {
            background: darkred;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Todo List</h1>

        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Enter a task">
            <button id="addBtn" type="button">Add</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById("taskInput");
            const task = input.value.trim();

            if (task === "") {
                alert("Please enter a task.");
                return;
            }

            const li = document.createElement("li");
            const span = document.createElement("span");
            span.textContent = task;

            span.onclick = function () {
                span.classList.toggle("completed");
            };

            const del = document.createElement("button");
            del.textContent = "Delete";
            del.className = "delete";

            del.onclick = function () {
                li.remove();
            };

            li.appendChild(span);
            li.appendChild(del);
            document.getElementById("taskList").appendChild(li);
            input.value = "";
        }

        document.getElementById("addBtn").addEventListener("click", addTask);
        document.getElementById("taskInput").addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                addTask();
            }
        });
    </script>
</body>
</html>
